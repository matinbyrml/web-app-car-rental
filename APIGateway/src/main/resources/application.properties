###################
#  Basic settings #
###################
server.port = 8084
spring.application.name = APIGateway
spring.docker.compose.file=../compose.yaml

##############################
#  Keycloak / OAuth2 client  #
##############################
spring.security.oauth2.client.provider.keycloak.issuer-uri           = http://localhost:9090/realms/alberioauto
spring.security.oauth2.client.provider.keycloak.user-name-attribute  = preferred_username

spring.security.oauth2.client.registration.gateway-client.provider            = keycloak
spring.security.oauth2.client.registration.gateway-client.client-id           = gateway-client
spring.security.oauth2.client.registration.gateway-client.client-secret       = IMppsc2KnqJMA5MqysBvoXguWYuIgLya
spring.security.oauth2.client.registration.gateway-client.authorization-grant-type = authorization_code
spring.security.oauth2.client.registration.gateway-client.redirect-uri        = {baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.gateway-client.scope               = openid,profile

############################
# Metrics / Actuator settings #
############################

management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.prometheus.access=unrestricted
management.prometheus.metrics.export.enabled=true
management.endpoint.health.show-details=always
management.security.enabled=false
management.endpoints.web.base-path=/actuator

############################
# Logging settings #
############################

# Force logback configuration file
logging.config=classpath:logback-spring.xml

# Log file location for Promtail
logging.file.path=./logs
logging.file.name=./logs/api-gateway.log

# Log levels
logging.level.it.polito.group9.apigateway=INFO
logging.level.org.springframework.security=DEBUG
logging.level.root=INFO


##################################################
#  SpringDoc (keep if you want Swagger-UI alive) #
##################################################
springdoc.api-docs.path                    = /api-docs
springdoc.swagger-ui.path                  = /swagger-ui.html
springdoc.swagger-ui.operationsSorter      = method
springdoc.swagger-ui.tagsSorter            = alpha
springdoc.swagger-ui.tryItOutEnabled       = true
springdoc.swagger-ui.filter                = true

###########################
#  Gateway MVC route table #
###########################

# ?? 0 � Reservation service (port 8081) ???????????????????????????????????????
spring.cloud.gateway.mvc.routes[0].id            = reservation-service
spring.cloud.gateway.mvc.routes[0].uri           = http://localhost:8080
spring.cloud.gateway.mvc.routes[0].predicates[0] = Path=/api/v1/reservations/**
spring.cloud.gateway.mvc.routes[0].filters[0]    = TokenRelay


