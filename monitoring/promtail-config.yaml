  server:
    http_listen_port: 3200
    grpc_listen_port: 0

  positions:
    filename: /tmp/positions.yaml

  clients:
    - url: http://loki:3100/loki/api/v1/push

  scrape_configs:
    - job_name: reservation-service-file
      static_configs:
        - targets: ['localhost']
          labels:
            job: reservation-service
            service: reservation-service
            application: alberioauto
            source: file
            __path__: /var/log/spring-boot/reservation/reservation-service*.log
      pipeline_stages:
        - json:
            expressions:
              timestamp: timestamp
              level: level
              message: message
              thread: thread
              service: service
              logger_name: logger_name
        - timestamp:
            source: timestamp
            format: '2006-01-02T15:04:05.000Z'
        - labels:
            level:
            service:
        - output:
            source: message

    - job_name: api-gateway
      static_configs:
        - targets: ['localhost']
          labels:
            job: api-gateway
            service: api-gateway
            __path__: /var/log/spring-boot/api-gateway/api-gateway.log
      pipeline_stages:
        - json:
            expressions:
              service: service
              level: level
              message: message
              timestamp: timestamp
        - timestamp:
            source: timestamp
            format: "2006-01-02 15:04:05.000"
        - labels:
            service:
            level:

    - job_name: user-management-service-file
      static_configs:
        - targets: ['localhost']
          labels:
            job: user-management-service
            service: user-management-service
            application: alberioauto
            source: file
            __path__: /var/log/spring-boot/user-management/user-management-service*.log
      pipeline_stages:
        - json:
            expressions:
              timestamp: timestamp
              level: level
              message: message
              thread: thread
              service: service
              logger_name: logger_name
        - timestamp:
            source: timestamp
            format: '2006-01-02 15:04:05.000Z'
        - labels:
            level:
            service:
        - output:
            source: message

    - job_name: payment-service
      static_configs:
        - targets: ['localhost']
          labels:
            job: payment-service
            service: payment-service
            __path__: /var/log/spring-boot/payment/payment-service*.log
      pipeline_stages:
        - json:
            expressions:
              service: service
              level: level
              message: message
              timestamp: timestamp
        - timestamp:
            source: timestamp
            format: "2006-01-02 15:04:05.000"
        - labels:
            service:
            level:

    - job_name: car-tracking-service
      static_configs:
        - targets: ['localhost']
          labels:
            job: car-tracking-service
            service: car-tracking-service
            __path__: /var/log/spring-boot/car-tracking/car-tracking-service*.log
      pipeline_stages:
        - json:
            expressions:
              service: service
              level: level
              message: message
              timestamp: timestamp
        - timestamp:
            source: timestamp
            format: "2006-01-02 15:04:05.000"
        - labels:
            service:
            level:

    - job_name: reservation-service-system
      journal:
        json: false
        max_age: 12h
        labels:
          job: reservation-service-system
          service: reservation-service
          application: alberioauto
          source: journal
